<!doctype html><html><head><meta charset="utf-8"></head><body>
<canvas id="c"></canvas>
<script src="../data/B1.js"></script>
<script>
// 도면의 방 색칠 영역을 픽셀 flood-fill 로 자동 검출해 정확한 방 bbox 산출.
// 벽(짙은 색)에서 멈추고, 같은 채움색으로만 번져서 방 하나의 정확한 경계를 얻음.
const f=new URLSearchParams(location.search).get('f')||'B1';
const SCALE=parseFloat(new URLSearchParams(location.search).get('s')||'0.5'); // 속도용 축소
const VBW={B1:2097.64,B2:2097.64,B3:2097.64,F1:841.89,F2:841.89}[f];
const VBH={B1:1190.55,B2:1190.55,B3:1190.55,F1:595.276,F2:595.276}[f];
const cv=document.getElementById('c'), ctx=cv.getContext('2d',{willReadFrequently:true});
let W,H,img32;
window.__ready=false;
const im=new Image();
im.onload=()=>{
  W=Math.round(VBW*SCALE); H=Math.round(VBH*SCALE);
  cv.width=W; cv.height=H;
  ctx.drawImage(im,0,0,W,H);
  img32=ctx.getImageData(0,0,W,H).data;
  window.__ready=true;
};
im.src='../svg/'+f+'.svg';

function px(x,y){const i=(y*W+x)*4; return [img32[i],img32[i+1],img32[i+2],img32[i+3]];}
function isWall(c){return (c[0]+c[1]+c[2])<150;}                 // 짙은 벽
function near(a,b,tol){return Math.abs(a[0]-b[0])<=tol&&Math.abs(a[1]-b[1])<=tol&&Math.abs(a[2]-b[2])<=tol;}

// seed(viewBox 좌표)에서 같은 색 영역 flood → bbox(viewBox) 반환
window.detect=function(sx,sy,tol){
  tol=tol||38;
  let x0=Math.round(sx*SCALE), y0=Math.round(sy*SCALE);
  let seed=px(x0,y0);
  // seed 가 벽/글자(짙음)면 주변에서 밝은 채움 픽셀 탐색
  if(isWall(seed)){
    let found=null;
    for(let r=2;r<40&&!found;r+=2)for(let dx=-r;dx<=r&&!found;dx+=2)for(let dy=-r;dy<=r&&!found;dy+=2){
      const c=px(x0+dx,y0+dy); if(c&&!isWall(c)){found=[x0+dx,y0+dy,c];}
    }
    if(found){x0=found[0];y0=found[1];seed=found[2];}
  }
  const seen=new Uint8Array(W*H), st=[[x0,y0]];
  let minX=x0,maxX=x0,minY=y0,maxY=y0,n=0;
  while(st.length){
    const [x,y]=st.pop(); if(x<0||y<0||x>=W||y>=H)continue;
    const k=y*W+x; if(seen[k])continue; seen[k]=1;
    const c=px(x,y); if(isWall(c)||!near(c,seed,tol))continue;
    n++; if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y;
    st.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
  const s=1/SCALE;
  return {rect:[Math.round(minX*s),Math.round(minY*s),Math.round((maxX-minX)*s),Math.round((maxY-minY)*s)],
          px:n, seedColor:seed};
};
// 여러 seed 일괄
window.detectAll=function(seeds){const o={};for(const s of seeds)o[s.code]=window.detect(s.x,s.y,s.tol);return o;};

// 통로(흰 보행공간) flood 시각화: seed에서 near-white 픽셀을 번져 빨강 틴트로 표시
// 통로는 채움 없는 투명 영역. (건물 밖도 투명이나 벽으로 막혀 내부 seed에선 안 샘)
function isWalk(c){return c[3]<70 || (c[3]>180 && c[0]>232 && c[1]>232 && c[2]>232);}
window.showCorridor=function(sx,sy){
  const x0=Math.round(sx*SCALE), y0=Math.round(sy*SCALE);
  const seen=new Uint8Array(W*H), st=[[x0,y0]];
  const id=ctx.getImageData(0,0,W,H), d=id.data;
  let n=0;
  while(st.length){const [x,y]=st.pop(); if(x<0||y<0||x>=W||y>=H)continue;
    const k=y*W+x; if(seen[k])continue; seen[k]=1;
    const c=[d[k*4],d[k*4+1],d[k*4+2],d[k*4+3]]; if(!isWalk(c))continue;
    d[k*4]=0; d[k*4+1]=210; d[k*4+2]=255; d[k*4+3]=205; n++;
    st.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);}
  ctx.putImageData(id,0,0);
  return {flooded:n};
};

// 현재 그래프(노드/간선) + 좌표 그리드를 캔버스에 오버레이
window.drawGraph=function(F){
  F=F||window.FLOOR_B1; const s=SCALE;
  ctx.lineWidth=1; ctx.font='11px monospace';
  // 그리드
  ctx.strokeStyle='rgba(0,80,255,.35)'; ctx.fillStyle='#0044cc';
  for(let x=0;x<=VBW;x+=100){ctx.beginPath();ctx.moveTo(x*s,0);ctx.lineTo(x*s,H);ctx.stroke();ctx.fillText(x,x*s+1,12);}
  for(let y=0;y<=VBH;y+=100){ctx.beginPath();ctx.moveTo(0,y*s);ctx.lineTo(W,y*s);ctx.stroke();ctx.fillText(y,1,y*s+11);}
  // 간선
  ctx.strokeStyle='#0a7d2c'; ctx.lineWidth=2.5;
  for(const [a,b] of F.edges){const p=F.nodes[a],q=F.nodes[b];if(!p||!q)continue;
    ctx.beginPath();ctx.moveTo(p[0]*s,p[1]*s);ctx.lineTo(q[0]*s,q[1]*s);ctx.stroke();}
  // 노드
  for(const k in F.nodes){const n=F.nodes[k];
    ctx.fillStyle='#0033cc';ctx.beginPath();ctx.arc(n[0]*s,n[1]*s,4,0,7);ctx.fill();
    ctx.fillStyle='#001a66';ctx.fillText(k,n[0]*s+5,n[1]*s-3);}
  // 도어
  ctx.fillStyle='#ff8c00';
  for(const r of F.rooms){if(r.door){ctx.beginPath();ctx.arc(r.door[0]*s,r.door[1]*s,3,0,7);ctx.fill();}}
  return 'graph drawn';
};

// flood 영역의 윤곽을 스캔라인으로 추출 → 단순 폴리곤(좌변 내려가고 우변 올라옴)
window.detectPoly=function(sx,sy,tol,bands){
  tol=tol||38; bands=bands||14;
  let x0=Math.round(sx*SCALE), y0=Math.round(sy*SCALE), seed=px(x0,y0);
  if(isWall(seed)){for(let r=2;r<40;r+=2){let f=false;for(let dx=-r;dx<=r&&!f;dx+=2)for(let dy=-r;dy<=r&&!f;dy+=2){const c=px(x0+dx,y0+dy);if(c&&!isWall(c)){x0+=dx;y0+=dy;seed=c;f=true;}}if(f)break;}}
  const seen=new Uint8Array(W*H), st=[[x0,y0]];
  const rows={}; let minY=y0,maxY=y0;
  while(st.length){const [x,y]=st.pop(); if(x<0||y<0||x>=W||y>=H)continue;
    const k=y*W+x; if(seen[k])continue; seen[k]=1;
    const c=px(x,y); if(isWall(c)||!near(c,seed,tol))continue;
    if(!rows[y])rows[y]=[x,x]; else{if(x<rows[y][0])rows[y][0]=x; if(x>rows[y][1])rows[y][1]=x;}
    if(y<minY)minY=y; if(y>maxY)maxY=y;
    st.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);}
  const s=1/SCALE, left=[], right=[];
  for(let i=0;i<=bands;i++){const y=Math.round(minY+(maxY-minY)*i/bands);
    let yy=y; while(yy<=maxY&&!rows[yy])yy++; if(!rows[yy])continue;
    left.push([Math.round(rows[yy][0]*s),Math.round(yy*s)]);
    right.push([Math.round(rows[yy][1]*s),Math.round(yy*s)]);}
  return left.concat(right.reverse());
};
</script></body></html>
